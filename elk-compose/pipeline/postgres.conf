# -----------------------
# PIPELINE POSTGRES
# INPUT  : topic Kafka "postgres-logs"
# FILTER : parse le format PostgreSQL avec Grok
# OUTPUT : index Elasticsearch "logs-postgres-*"
# -----------------------

input {
  kafka {
    bootstrap_servers => "broker-1:19092,broker-2:19092,broker-3:19092"
    topics            => ["postgres-logs"]
    group_id          => "logstash-postgres"
    auto_offset_reset => "earliest"
    codec             => json
  }
}

filter {

  # - Parse le format PostgreSQL -
  # Format : 2026-03-08 01:16:48.193 UTC [69] ERROR:  message
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} UTC \[%{NUMBER:pid:int}\] %{WORD:log_level}:\s+%{GREEDYDATA:pg_message}"
    }
    tag_on_failure => ["_grokparsefailure_postgres"]
  }

  # - Convertit le timestamp en vrai champ date -
  date {
    match  => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # - Normalise le niveau de log -
  # Postgres utilise LOG, WARNING, ERROR, FATAL, PANIC
  if [log_level] {
    mutate {
      lowercase => ["log_level"]
    }
    # Renomme LOG → info pour cohérence avec les autres pipelines
    if [log_level] == "log" {
      mutate { update => { "log_level" => "info" } }
    }
    if [log_level] == "fatal" or [log_level] == "panic" {
      mutate { update => { "log_level" => "error" } }
    }
  }

  # - Détecte les requêtes lentes -
  # Format : duration: 2500.123 ms  statement: SELECT ...
  if [pg_message] =~ /duration:/ {
    grok {
      match => {
        "pg_message" => "duration: %{NUMBER:query_duration_ms:float} ms\s+%{GREEDYDATA:sql_statement}"
      }
      tag_on_failure => []   # pas de tag si ce sous-pattern échoue
    }
    mutate { add_tag => ["slow_query"] }
  }

  # - Détecte les erreurs critiques -
  if [pg_message] =~ /deadlock/ {
    mutate { add_tag => ["deadlock"] }
  }
  if [pg_message] =~ /authentication failed/ {
    mutate { add_tag => ["auth_failure"] }
  }

  # - Ajoute les métadonnées de la pipeline -
  mutate {
    add_field => {
      "source_pipeline" => "postgres"
      "environment"     => "production"
    }
    remove_field => ["@version", "agent", "ecs", "input", "log", "event"]
  }

}

output {
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_verification_mode => "none"
    index    => "logs-postgres-%{+yyyy.MM.dd}"
  }
}