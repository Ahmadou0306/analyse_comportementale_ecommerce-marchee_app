# ─────────────────────────────────────────────
# PIPELINE BACKEND
# INPUT  : topic Kafka "backend-logs"
# FILTER : 2 formats détectés automatiquement
#   - Format HTTP  : [timestamp] METHOD /path STATUS DURATIONms
#   - Format CART  : [CART] {...json...}
# OUTPUT : index Elasticsearch "logs-backend-*"
# ─────────────────────────────────────────────

input {
  kafka {
    bootstrap_servers => "broker-1:19092,broker-2:19092,broker-3:19092"
    topics            => ["backend-logs"]
    group_id          => "logstash-backend"
    auto_offset_reset => "earliest"
    codec             => json
  }
}

filter {

  # ─────────────────────────────────────────────
  # DÉTECTION DU FORMAT
  # ─────────────────────────────────────────────

  # Format CART → commence par [CART]
  if [message] =~ /^\[CART\]/ {

    mutate { add_field => { "log_type" => "cart_event" } }

    # Extrait le JSON après [CART]
    grok {
      match => {
        "message" => "^\[CART\] %{GREEDYDATA:cart_json}"
      }
    }

    # Parse le JSON du panier
    json {
      source        => "cart_json"
      target        => "cart"          # tout le JSON dans un objet "cart"
      remove_field  => ["cart_json"]
    }

    # Remonte le timestamp du JSON comme @timestamp
    date {
      match  => ["[cart][timestamp]", "ISO8601"]
      target => "@timestamp"
    }

    mutate { add_field => { "log_level" => "info" } }

  # Format HTTP → [timestamp] METHOD /path STATUS DURATIONms
  } else if [message] =~ /^\[\d{4}-/ {

    mutate { add_field => { "log_type" => "http_request" } }

    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{WORD:method} %{URIPATH:path} %{NUMBER:status_code:int} %{NUMBER:duration_ms:int}ms"
      }
      tag_on_failure => ["_grokparsefailure_backend"]
    }

    date {
      match  => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    # Catégorise selon le status HTTP
    if [status_code] >= 500 {
      mutate { add_field => { "log_level" => "error" } }
    } else if [status_code] >= 400 {
      mutate { add_field => { "log_level" => "warn" } }
    } else {
      mutate { add_field => { "log_level" => "info" } }
    }

  # Format inconnu
  } else {
    mutate {
      add_field => { "log_type" => "unknown" }
      add_tag   => ["_unparsed"]
    }
  }

  # ─────────────────────────────────────────────
  # MÉTADONNÉES COMMUNES (tous les formats)
  # ─────────────────────────────────────────────
  mutate {
    add_field => {
      "source_pipeline" => "backend"
      "environment"     => "production"
    }
    remove_field => ["@version", "agent", "ecs", "input", "log", "event"]
  }

}

output {
  elasticsearch {
    hosts    => ["https://es01:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_verification_mode => "none"
    index    => "logs-backend-%{+yyyy.MM.dd}"
  }
}