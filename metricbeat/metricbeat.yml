metricbeat.modules:
  # ----------------------─
  # MODULE SYSTEM — Métriques de l'hôte
  # CPU, RAM, disque, réseau, processus
  # ----------------------─
  - module: system
    metricsets:
      - cpu
      - load
      - memory
      - network
      - process
      - process_summary
      - diskio
      - filesystem
      - fsstat
    enabled: true
    period: 10s
    processes: ['.*']
    process.include_top_n:
      by_cpu: 5       # top 5 processus par CPU
      by_memory: 5    # top 5 processus par RAM
    cpu.metrics: ["percentages", "normalized_percentages"]

  # ----------------------─
  # MODULE DOCKER — Métriques des conteneurs ELK
  # CPU, RAM, réseau de chaque conteneur
  # ----------------------─
  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - event
      - healthcheck
      - info
      - memory
      - network
    hosts: ["unix:///var/run/docker.sock"]
    period: 10s
    enabled: true

# ----------------------─
# OUTPUT — Envoi direct vers Elasticsearch
# Pas de passage par Kafka pour éviter
# la dépendance circulaire
# ----------------------─
output.elasticsearch:
  hosts:
    - ${ES_HOST}
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"
  ssl.verification_mode: "none"
  index: "metrics-elk-%{+yyyy.MM.dd}"

# ----------------------─
# DASHBOARDS — Chargement automatique dans Kibana
# Servira de référence pour comparer avec
# les dashboards personnalisés que tu créeras
# ----------------------─
setup.kibana:
  host: ${KIBANA_HOST}
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"

setup.dashboards.enabled: true
setup.ilm.enabled: false
setup.template.name: "metrics-elk"
setup.template.pattern: "metrics-elk-*"

logging.level: info