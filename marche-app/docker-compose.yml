services:
  # ─────────────────────────────────────────────
  # BASE DE DONNÉES PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: marche_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
      POSTGRES_DB: marche_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c log_min_messages=warning
      -c log_min_duration_statement=1000
    networks:
      - marche-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # BACKEND Express.js
  # ─────────────────────────────────────────────
  backend:
    build:
      context: backend
      dockerfile: dockerfile
    container_name: marche_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:passer@db:5432/marche_db
      JWT_SECRET: ${JWT_SECRET:-marche-secret-key-change-in-production}
      OTP_DEFAULT_CODE: ${OTP_DEFAULT_CODE:-123456}
      ADMIN_PHONE: ${ADMIN_PHONE:-810000000}
      ADMIN_COUNTRY_CODE: ${ADMIN_COUNTRY_CODE:-+221}
      ADMIN_FIRSTNAME: ${ADMIN_FIRSTNAME:-Admin}
      ADMIN_LASTNAME: ${ADMIN_LASTNAME:-MARCHÉ}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@marche.cd}
      CURRENCY: FCFA
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/images:/app/images
    depends_on:
      db:
        condition: service_healthy
    networks:
      - marche-network
    labels:
      collect_logs: "true"          # ← Filebeat collectera ce conteneur
      filebeat_topic: "backend-logs"  # ← topic Kafka cible
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: dockerfile
    container_name: marche_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
      VITE_API_TIMEOUT: ${VITE_API_TIMEOUT:-10000}
      VITE_APP_NAME: ${VITE_APP_NAME:-MARCHÉ}
      VITE_CURRENCY: ${VITE_CURRENCY:-FCFA}
      VITE_COUNTRY_CODE: ${VITE_COUNTRY_CODE:-+221}
      VITE_FREE_SHIPPING_THRESHOLD: ${VITE_FREE_SHIPPING_THRESHOLD:-50000}
      VITE_SHIPPING_COST: ${VITE_SHIPPING_COST:-5000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - marche-network
    labels:
      collect_logs: "true"           # ← Filebeat collectera ce conteneur
      filebeat_topic: "frontend-logs"  # ← topic Kafka cible
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────────
  # FILEBEAT APP — Collecte les logs des conteneurs
  # Envoie vers Kafka selon le label filebeat_topic
  # ─────────────────────────────────────────────
  filebeat-app:
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    container_name: filebeat-app
    user: root
    # correction des permissions puis lancement filebeat
    command: >
      bash -c "
        cp /usr/share/filebeat/filebeat.yml /tmp/filebeat.yml &&
        chmod go-w /tmp/filebeat.yml &&
        filebeat -e -c /tmp/filebeat.yml
      "
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    networks:
      - kafka-net
      - marche-network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
    driver: local

networks:
  marche-network:
    name: marche-network
    driver: bridge
  kafka-net:
    external: true