filebeat.inputs:

  # ----------------------─
  # SOURCE : logs Docker uniquement des conteneurs app
  # Filtre par label collect_logs=true
  # Ignore ES, Kafka, Logstash, Metricbeat...
  # ----------------------─
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log

    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

      # Supprime les événements qui ne viennent pas des conteneurs app
      - drop_event:
          when:
            not:
              or:
                - contains:
                    container.name: "marche_backend"
                - contains:
                    container.name: "marche_frontend"
                - contains:
                    container.name: "marche_postgres"

# ----------------------─
# ROUTING : envoie vers le bon topic Kafka
# selon le nom du conteneur
# ----------------------─
output.kafka:
  hosts:
    - "broker-1:19092"
    - "broker-2:19092"
    - "broker-3:19092"

  topics:
    - topic: "frontend-logs"
      when.contains:
        container.name: "marche_frontend"
    - topic: "backend-logs"
      when.contains:
        container.name: "marche_backend"
    - topic: "postgres-logs"
      when.contains:
        container.name: "marche_postgres"
    - topic: "app-logs"   # fallback

  required_acks: 1
  compression: gzip
  max_message_bytes: 1000000

filebeat.registry.path: /usr/share/filebeat/data/registry

logging.level: info
logging.to_files: false