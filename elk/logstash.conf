input {
  # Réception de logs via TCP
  tcp {
    port => 5000
    codec => json
  }
  
  # Réception de logs via UDP
  udp {
    port => 5000
    codec => json
  }
  
  # Collecte des logs Docker directement
  # (Alternative à Filebeat)
  # Note: Nécessite le plugin logstash-input-docker_logs
}

filter {
  # Parsing des logs selon leur type
  if [type] == "nginx-access" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }
    geoip {
      source => "clientip"
      target => "geoip"
    }
    useragent {
      source => "agent"
      target => "user_agent"
    }
  }
  
  # Parsing des logs JSON (déjà structurés)
  if [type] == "app-json" {
    json {
      source => "message"
      target => "app"
    }
  }
  
  # Ajout de métadonnées
  mutate {
    add_field => { "[@metadata][target_index]" => "logstash-%{+YYYY.MM.dd}" }
  }
  
  # Suppression de champs inutiles
  mutate {
    remove_field => ["@version", "host"]
  }
}

output {
  # Envoi vers Elasticsearch
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS}"]
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    cacert => "/usr/share/logstash/certs/ca/ca.crt"
    index => "%{[@metadata][target_index]}"
    manage_template => true
  }
  
  # Debug: affichage dans la console (optionnel)
  # stdout {
  #   codec => rubydebug
  # }
}